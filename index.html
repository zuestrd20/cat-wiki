<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌寵圖鑑 - 動森風格</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ac-green: #78d2a0;
            --ac-yellow: #fdf2a6;
            --ac-brown: #8d6e63;
            --ac-beige: #f9f1d0;
            --ac-leaf: #5eb88d;
            --ac-orange: #fbb03b;
        }
        body {
            background-color: var(--ac-beige);
            background-image: radial-gradient(var(--ac-yellow) 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--ac-brown);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .header {
            background-color: var(--ac-green);
            padding: 20px;
            border-radius: 50px;
            text-align: center;
            border: 8px solid white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            margin-bottom: 20px;
            position: relative;
        }
        .header::after {
            content: '🍃';
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 2rem;
        }
        .header h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            margin: 0;
            color: white;
            text-shadow: 2px 2px 0 var(--ac-leaf);
            font-size: 2.5rem;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: white;
            border: 4px solid var(--ac-green);
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--ac-brown);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--ac-leaf);
        }
        .tab-btn.active {
            background: var(--ac-green);
            color: white;
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--ac-leaf);
        }
        .tab-btn:hover:not(.active) {
            transform: scale(1.05);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 35px;
            padding: 20px;
            text-align: center;
            border: 6px solid var(--ac-green);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--ac-leaf);
        }
        .card:hover {
            transform: scale(1.03) rotate(1deg);
            box-shadow: 0 6px 0 var(--ac-leaf);
        }
        .cat-avatar {
            width: 160px;
            height: 160px;
            background: var(--ac-yellow);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid var(--ac-brown);
            overflow: hidden;
        }
        .cat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cat-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--ac-brown);
        }
        .cat-info {
            font-size: 1rem;
            font-weight: 400;
            color: #7d5e53;
            margin-bottom: 10px;
        }
        .speech-bubble {
            background: #fff9e6;
            border-radius: 20px;
            padding: 12px;
            margin-top: 10px;
            border: 2px solid var(--ac-brown);
            position: relative;
            font-size: 0.95rem;
            font-weight: 400;
            color: #5d4037;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 10px 10px 10px;
            border-style: solid;
            border-color: transparent transparent var(--ac-brown) transparent;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 1.3rem;
            padding-bottom: 40px;
            font-family: 'ZCOOL KuaiLe', cursive;
        }
    </style>
</head>

        const grid = document.getElementById('petGrid');
        
        function renderPets(petList, type) {
            grid.innerHTML = '';
            petList.forEach(pet => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="cat-avatar"><img src="${pet.img}" alt="${pet.name}"></div>
                    <div class="cat-name">${pet.name}</div>
                    <div class="cat-info">${pet.trait}</div>
                    <div class="speech-bubble">
                        我的個性是「${pet.personality}」喔！${type === 'cats' ? '喵～' : '汪！'}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = event.target;
            activeBtn.classList.add('active');
            
            if (tab === 'cats') {
                renderPets(cats, 'cats');
            } else {
                renderPets(dogs, 'dogs');
            }
        }

        // Initial render
        renderPets(cats, 'cats');
