<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵星人圖鑑 - 動森風格</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --ac-green: #78d2a0;
            --ac-yellow: #fdf2a6;
            --ac-brown: #8d6e63;
            --ac-beige: #f9f1d0;
            --ac-leaf: #5eb88d;
        }
        body {
            background-color: var(--ac-beige);
            background-image: radial-gradient(var(--ac-yellow) 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            color: var(--ac-brown);
            margin: 0;
            padding: 20px;
        }
        .header {
            background-color: var(--ac-green);
            padding: 20px;
            border-radius: 50px;
            text-align: center;
            border: 8px solid white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            margin-bottom: 30px;
            position: relative;
        }
        .header::after {
            content: '🍃';
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 2rem;
        }
        h1 { margin: 0; color: white; text-shadow: 2px 2px 0 var(--ac-leaf); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 30px;
            padding: 15px;
            text-align: center;
            border: 5px solid var(--ac-green);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: scale(1.05) rotate(2deg); }
        .cat-avatar {
            width: 150px;
            height: 150px;
            background: var(--ac-yellow);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border: 4px solid var(--ac-brown);
            overflow: hidden;
        }
        .cat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cat-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .cat-info { font-size: 0.9rem; color: #666; }
        .speech-bubble {
            background: white;
            border-radius: 20px;
            padding: 10px;
            margin-top: 10px;
            border: 2px solid var(--ac-brown);
            position: relative;
        }
        footer { text-align: center; margin-top: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐾 歡迎來到喵喵島 🐾</h1>
        <p>這裡有 30 種超可愛的貓咪鄰居喔！</p>
    </div>
    <div class="grid" id="catGrid"></div>
    <footer>甜心秘書為你製作 💖🍃</footer>

            { name: "土耳其安哥拉貓", img: "https://cdn2.thecatapi.com/images/0XYvRd7oD.jpg", personality: "優雅舞者", trait: "絲滑長毛" },
            { name: "曼切堪貓", img: "https://cdn2.thecatapi.com/images/0XYvRd7oD.jpg", personality: "可愛短腿", trait: "臘腸貓" },
            { name: "美國捲耳貓", img: "https://cdn2.thecatapi.com/images/0XYvRd7oD.jpg", personality: "好奇寶寶", trait: "向後捲的耳朵" }
        ];

        const grid = document.getElementById('catGrid');
        cats.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="cat-avatar"><img src="${cat.img}" alt="${cat.name}"></div>
                <div class="cat-name">${cat.name}</div>
                <div class="cat-info">${cat.trait}</div>
                <div class="speech-bubble">
                    我的個性是「${cat.personality}」喔！喵～
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
